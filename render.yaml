services:
  - type: web
    name: nid-queuing-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
