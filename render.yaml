services:
  - type: web
    name: nid-queuing-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600
    # --timeout 600: video uploads now stream through this worker on their
    # way to Drive (see README "Staff console: managing AVP videos"), and
    # gunicorn's default 30s worker timeout would kill any upload that
    # takes longer than that to transfer.
    envVars:
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
